name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: 'manual-build'
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Standard matrix: Linux, macOS (Intel + ARM), Windows (x64 + ARM64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-release:
    name: Build on ${{ matrix.os }} (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (x64) ──────────────────────────────────────────────────────
          - os: ubuntu-latest
            target_name: kalidous-linux-amd64

          # ── Linux (ARM64, cross-compiled) ─────────────────────────────────────
          - os: ubuntu-latest
            target_name: kalidous-linux-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

          # ── macOS Intel (x64) ────────────────────────────────────────────────
          # FIX: macos-14 is an ARM (M1/M2) runner, NOT Intel.
          # macos-13 is the last stable Intel runner.
          - os: macos-13
            target_name: kalidous-macos-amd64

          # ── macOS Apple Silicon (ARM64) ───────────────────────────────────────
          - os: macos-latest
            target_name: kalidous-macos-arm64

          # ── Windows x64 ──────────────────────────────────────────────────────
          - os: windows-latest
            target_name: kalidous-windows-amd64.exe
            msvc_arch: amd64

          # ── Windows ARM64 (cross-compiled from x64 host) ─────────────────────
          - os: windows-latest
            target_name: kalidous-windows-arm64.exe
            msvc_arch: amd64_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.26.x'

      # Install cross-compiler for Linux ARM64 builds only.
      - name: Install ARM64 cross-compiler
        if: matrix.target_name == 'kalidous-linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Setup MSVC Dev Environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      # FIX: cmake_flags was defined in the matrix but never passed here.
      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/bin/kalidous.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/bin/kalidous
            cp build/bin/kalidous "artifacts/${{ matrix.target_name }}"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Void Linux glibc (x86_64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-void-glibc:
    name: Build Void Linux (glibc x86_64)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/void-linux/void-glibc
      options: --user root
    steps:
      - name: Install git (required by actions/checkout)
        run: |
          xbps-install -Suy xbps
          xbps-install -Suy git

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: xbps-install -Suy cmake ninja gcc make pkg-config

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/bin/kalidous
          cp build/bin/kalidous artifacts/kalidous-void-linux-amd64-glibc

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/kalidous-void-linux-amd64-glibc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Void Linux musl (x86_64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-void-musl:
    name: Build Void Linux (musl x86_64)
    runs-on: ubuntu-latest
    # FIX: was missing — required to upload to releases from inside a container.
    permissions:
      contents: write
    container:
      image: ghcr.io/void-linux/void-musl
      # FIX: was missing — xbps-install requires root, just like the glibc job.
      options: --user root
    steps:
      # FIX: git must be installed before actions/checkout, same as glibc job.
      # Chaining with && is risky — a repo refresh failure silently skips the install.
      - name: Install git (required by actions/checkout)
        run: |
          xbps-install -Suy xbps
          xbps-install -Suy git

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: xbps-install -Suy cmake ninja gcc make pkg-config

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      # FIX: this step was entirely missing — binary was never copied to artifacts/.
      # FIX: original upload path was 'artifacts/build/bin/kalidous' (spurious build/ prefix).
      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/bin/kalidous
          cp build/bin/kalidous artifacts/kalidous-void-linux-amd64-musl

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/kalidous-void-linux-amd64-musl
        env:
          # FIX: GITHUB_TOKEN env was missing entirely on this job.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # WebAssembly (Emscripten)
  # ─────────────────────────────────────────────────────────────────────────────
  build-wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Verify Emscripten
        run: emcc -v

      - name: Configure and Build
        run: |
          emcmake cmake -B build-wasm -DCMAKE_BUILD_TYPE=Release
          cmake --build build-wasm

      # Emscripten typically emits .wasm + .js + .html together.
      # Collecting all three avoids a silent partial upload.
      - name: Prepare Artifacts
        run: |
          mkdir -p artifacts
          cp build-wasm/kalidous.wasm artifacts/ 2>/dev/null || true
          cp build-wasm/kalidous.js   artifacts/ 2>/dev/null || true
          cp build-wasm/kalidous.html artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - name: Upload WASM
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/*
        env:
          # FIX: GITHUB_TOKEN env was missing entirely on this job.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
