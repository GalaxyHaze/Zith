name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: 'manual-build'
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false


permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Standard matrix: Linux, macOS (Intel + ARM), Windows (x64 + ARM64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-release:
    name: Build on ${{ matrix.os }} (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (x64) ──────────────────────────────────────────────────────
          - os: ubuntu-latest
            target_name: kalidous-linux-amd64

          # ── macOS Intel (x64) ────────────────────────────────────────────────
          # macos-12 is deprecated; macos-13 is the last stable Intel runner.
          - os: macos-13
            target_name: kalidous-macos-amd64

          # ── macOS Apple Silicon (ARM64) ───────────────────────────────────────
          - os: macos-latest
            target_name: kalidous-macos-arm64

          # ── Windows x64 ──────────────────────────────────────────────────────
          - os: windows-latest
            target_name: kalidous-windows-amd64.exe
            # Default MSVC host+target toolchain (x64 → x64)
            msvc_arch: amd64

          # ── Windows ARM64 (cross-compiled from x64 host) ─────────────────────
          # FIX: '-A ARM64' is a Visual Studio generator flag and is incompatible
          #      with '-G Ninja'. The correct approach for Ninja cross-compilation
          #      is to activate the amd64_arm64 MSVC toolchain via msvc-dev-cmd.
          - os: windows-latest
            target_name: kalidous-windows-arm64.exe
            msvc_arch: amd64_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.26.x'

      # Activates the correct MSVC toolchain.
      # For ARM64 cross-compilation, 'amd64_arm64' sets the host as x64
      # and the target as ARM64 — required for Ninja-based cross builds.
      - name: Setup MSVC Dev Environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/bin/kalidous.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/bin/kalidous
            cp build/bin/kalidous "artifacts/${{ matrix.target_name }}"
          fi

      # FIX: Updated from @v1 (deprecated Node 16) to @v2 (Node 20+).
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          # Se houver input manual, usa-o. Se não, usa a tag do evento.
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ─────────────────────────────────────────────────────────────────────────────
  # Void Linux (glibc, x86_64) — runs inside an official Void container
  # ─────────────────────────────────────────────────────────────────────────────
  build-void-glibc:
    name: Build Void Linux (glibc x86_64)
    runs-on: ubuntu-latest
    # Explicit per-job permission so the upload step can create/update releases
    # even when running inside a container, where the workflow-level setting
    # may not propagate reliably.
    permissions:
      contents: write

    container:
      image: ghcr.io/void-linux/void-glibc
      options: --user root

    steps:
      # FIX: actions/checkout@v4 requires git to be present on the system.
      # In a minimal Void Linux container, git is NOT pre-installed.
      # Installing it here (before the checkout step) prevents a silent failure
      # or a misleading "not a git repository" error.
      - name: Install git (required by actions/checkout)
        run: |
          xbps-install -Suy xbps
          xbps-install -Suy git

      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: xbps-install -Suy cmake ninja gcc make pkg-config

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/bin/kalidous
          cp build/bin/kalidous artifacts/kalidous-void-linux-amd64-glibc

      # FIX: Updated from @v1 (deprecated Node 16) to @v2 (Node 20+).
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          # Se houver input manual, usa-o. Se não, usa a tag do evento.
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/kalidous-void-linux-amd64-glibc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

