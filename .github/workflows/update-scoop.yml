name: Update Scoop Manifest

on:
  workflow_run:
    workflows: ["Build and Release"] # <--- MUST match the 'name' in build-release.yml
    types:
      - completed

jobs:
  update-scoop:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Get latest release tag
        id: tag
        run: |
          # We query the main repo to find the latest tag
          TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release binaries
        run: |
          gh release download ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} \
            --pattern "kalidous-windows-amd64.exe" \
            --pattern "kalidous-windows-arm64.exe" \
            --dir release-bins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          AMD64=$(sha256sum release-bins/kalidous-windows-amd64.exe | cut -d' ' -f1)
          ARM64=$(sha256sum release-bins/kalidous-windows-arm64.exe | cut -d' ' -f1)
          echo "amd64=$AMD64" >> $GITHUB_OUTPUT
          echo "arm64=$ARM64" >> $GITHUB_OUTPUT

      - name: Checkout Kalidous-Lang
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}
          # Sem 'repository' — usa o repo atual

      - name: Update manifest
        run: |
          jq \
            --arg version "${{ steps.tag.outputs.version }}" \
            --arg amd64 "${{ steps.hashes.outputs.amd64 }}" \
            --arg arm64 "${{ steps.hashes.outputs.arm64 }}" \
            '
              .version = $version |
              .architecture["64bit"].hash = $amd64 |
              .architecture["64bit"].url = "https://github.com/GalaxyHaze/Kalidous-Lang/releases/download/v\($version)/kalidous-windows-amd64.exe" |
              .architecture.arm64.hash = $arm64 |
              .architecture.arm64.url = "https://github.com/GalaxyHaze/Kalidous-Lang/releases/download/v\($version)/kalidous-windows-arm64.exe"
            ' .github/scoop/bucket/kalidous.json > tmp.json && mv tmp.json .github/scoop/bucket/kalidous.json
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/scoop/bucket/kalidous.json
          git diff --staged --quiet || git commit -m "chore: update scoop manifest to ${{ steps.tag.outputs.tag }}"
          git push
