name: Create Release Tag and Page

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # FIX: Use a PAT here so the tag push later can trigger
          # the Build & Release workflow. GITHUB_TOKEN pushes are
          # deliberately blocked from firing downstream workflows.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and Push Tag
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Error: Tag v${{ inputs.version }} already exists."
            exit 1
          fi
          git tag -a "v${{ inputs.version }}" -m "Release v${{ inputs.version }}"
          # FIX: This push now uses the PAT (via the checkout token above),
          # which GitHub treats as a real user event — triggering Build & Release.
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub Release Page
        # FIX: Updated from @v1 (Node 16, deprecated) to @v2.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Release v${{ inputs.version }}
          body: |
            ## Changes in v${{ inputs.version }}

            ### Installation
            **Linux / macOS:**
            bash
            curl -fsSL https://raw.githubusercontent.com/GalaxyHaze/Kalidous-Lang/main/install.sh | bash

            **Windows:**
            powershell
            irm https://raw.githubusercontent.com/GalaxyHaze/Kalidous-Lang/main/install.ps1 | iex

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  build:
    name: Trigger Build & Release
    needs: tag-and-release   # waits for tag + release page to be created first
    uses: ./.github/workflows/build-and-release.yml
    secrets: inherit         # passes GITHUB_TOKEN through automatically
    permissions:
      contents: write
