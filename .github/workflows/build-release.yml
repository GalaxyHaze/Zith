name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: 'v0.0.1'
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Standard matrix: Linux, macOS (Intel + ARM), Windows (x64 + ARM64)
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-release:
    name: Build on ${{ matrix.os }} (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (x64) ──────────────────────────────────────────────────────
          - os: ubuntu-latest
            target_name: kalidous-linux-amd64

          # ── Linux (ARM64, cross-compiled) ─────────────────────────────────────
          - os: ubuntu-latest
            target_name: kalidous-linux-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++

          # ── macOS Intel (x64, cross-compiled from ARM runner) ─────────────────
          - os: macos-latest
            target_name: kalidous-macos-amd64
            cmake_flags: -DCMAKE_OSX_ARCHITECTURES=x86_64

          # ── macOS Apple Silicon (ARM64) ───────────────────────────────────────
          - os: macos-latest
            target_name: kalidous-macos-arm64

          # ── Windows x64 ──────────────────────────────────────────────────────
          - os: windows-latest
            target_name: kalidous-windows-amd64.exe
            msvc_arch: amd64

          # ── Windows ARM64 (cross-compiled from x64 host) ─────────────────────
          - os: windows-latest
            target_name: kalidous-windows-arm64.exe
            msvc_arch: amd64_arm64

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.26.x'

      - name: Install ARM64 cross-compiler
        if: matrix.target_name == 'kalidous-linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Setup MSVC Dev Environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Configure CMake
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/bin/kalidous.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/bin/kalidous
            cp build/bin/kalidous "artifacts/${{ matrix.target_name }}"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # musl static builds (x86_64 + ARM64) via Zig toolchain
  # ─────────────────────────────────────────────────────────────────────────────
  build-musl:
    name: Build Linux musl static (${{ matrix.target_name }})
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: kalidous-linux-amd64-musl
            zig_target: x86_64-linux-musl

          - target_name: kalidous-linux-arm64-musl
            zig_target: aarch64-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig and build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build wget
          wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar -xf zig-linux-x86_64-0.13.0.tar.xz
          echo "$PWD/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="zig;cc;-target;${{ matrix.zig_target }}" \
            -DCMAKE_CXX_COMPILER="zig;c++;-target;${{ matrix.zig_target }}" \
            -DCMAKE_EXE_LINKER_FLAGS="-static"

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/bin/kalidous
          cp build/bin/kalidous artifacts/${{ matrix.target_name }}
          file artifacts/${{ matrix.target_name }}
          ldd  artifacts/${{ matrix.target_name }} || echo "Static binary confirmed"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/${{ matrix.target_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # WebAssembly (Emscripten)
  # ─────────────────────────────────────────────────────────────────────────────
  build-wasm:
    name: Build WebAssembly
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Install System Deps (Safety for FetchContent)
        # Although we use FetchContent, installing libtomlplusplus-dev ensures 
        # headers are findable if Emscripten's CMake behaves oddly.
        run: sudo apt-get update && sudo apt-get install -y libtomlplusplus-dev

      - name: Verify Emscripten
        run: emcc -v

      - name: Configure CMake
        run: |
          emcmake cmake -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O3 -flto" \
            -DCMAKE_CXX_FLAGS="-O3 -flto" \
            -DCMAKE_EXE_LINKER_FLAGS="\
              -O3 -flto \
              --closure 1 \
              -s WASM=1 \
              -s FILESYSTEM=1 \
              -s ENVIRONMENT='web,node'"

      - name: Build WASM
        run: cmake --build build-wasm --config Release -j$(nproc)

      - name: Prepare Artifact (zip)
        run: |
          mkdir -p artifacts wasm-staging
        
          echo "=== Emscripten output ==="
          find build-wasm -type f | sort
        
          # FIX: Look in build-wasm/bin/ as per your CMakeLists.txt config
          if [ -d "build-wasm/bin" ]; then
             cp build-wasm/bin/* wasm-staging/
          else
             # Fallback to root if bin dir is missing for some reason
             cp build-wasm/* wasm-staging/ 2>/dev/null || true
          fi
        
          echo "=== WASM files staged ==="
          ls -lh wasm-staging/
        
          if [ -z "$(ls -A wasm-staging/)" ]; then
            echo "Error: No WASM files found."
            exit 1
          fi
        
          cd wasm-staging && zip ../artifacts/kalidous-wasm.zip ./* && cd ..
        
          echo "=== Final artifact ==="
          ls -lh artifacts/

      - name: Upload WASM
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: artifacts/kalidous-wasm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
