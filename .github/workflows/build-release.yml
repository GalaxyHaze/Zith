name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release'
        required: true
        default: 'v0.0.1'
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false

permissions:
  contents: write

jobs:
  # Job dedicado para criar release e evitar race conditions
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set-tag.outputs.tag }}
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - id: set-tag
        run: |
          # Prioridade: Input manual > Input de chamada > Ref do Git
          TAG="${{ github.event.inputs.tag_name || inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      - name: Create Release (ou usar existente)
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.set-tag.outputs.tag }}
          generate_release_notes: true
          draft: true  # Começa como draft para evitar publicações prematuras
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for Release to be available
        run: |
          # Pequeno delay para garantir que a release foi criada no DB
          sleep 2

  build-and-release:
    needs: create-release
    name: Build on ${{ matrix.os }} (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: zith-linux-amd64
            cmake_flags: "-DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++"
          - os: macos-latest
            target_name: zith-macos-arm64
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - os: windows-latest
            target_name: zith-windows-amd64.exe
            cmake_flags: "-A x64"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necessário para versioning baseado em git

      # Cache para dependências do sistema (mais eficaz em Linux)
      - name: Cache APT packages (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ninja-build libssl-dev pkg-config
          version: 1.0

      # Cache para Homebrew (macOS)
      - name: Cache Homebrew (macOS)
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.github/workflows/build-release.yml') }}
          restore-keys: |
            ${{ runner.os }}-homebrew-

      # Setup CMake com cache
      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmake-version: '3.27.x'

      # Cache para build directory (reutilizar objetos compilados)
      - name: Restore CMake cache
        uses: actions/cache@v4
        with:
          path: |
            build
            ~/.ccache
            ${{ env.VCPKG_ROOT }}
          key: ${{ runner.os }}-cmake-${{ matrix.target_name }}-${{ hashFiles('CMakeLists.txt', 'src/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-${{ matrix.target_name }}-
            ${{ runner.os }}-cmake-

      # Setup Ninja
      - name: Setup Ninja (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          if ! command -v ninja &> /dev/null; then
            if [ "${{ runner.os }}" == "macOS" ]; then
              brew install ninja
            else
              sudo apt-get update && sudo apt-get install -y ninja-build
            fi
          fi

      # Setup Clang (Linux)
      - name: Setup Clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      # Configure CMake com melhor controlo de paths
      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            ${{ matrix.cmake_flags }} \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }}
        shell: bash

      - name: Build
        run: cmake --build build --config Release --parallel
        shell: bash

      # Validação robusta de artefatos
      - name: Prepare Artifact with Validation
        shell: bash
        run: |
          set -euo pipefail
          
          mkdir -p artifacts
          
          # Definir nome e extensão baseado no OS
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BINARY_NAME="zith.exe"
            OUTPUT_PATH="artifacts/${{ matrix.target_name }}"
          else
            BINARY_NAME="zith"
            OUTPUT_PATH="artifacts/${{ matrix.target_name }}"
          fi
          
          # Busca recursiva com validação
          FOUND_COUNT=$(find build -type f -name "$BINARY_NAME" 2>/dev/null | wc -l)
          
          if [ "$FOUND_COUNT" -eq 0 ]; then
            echo "❌ ERROR: Binário '$BINARY_NAME' não encontrado em build/"
            echo "Conteúdo de build/:"
            find build -type f -executable 2>/dev/null || find build -type f 2>/dev/null | head -20
            exit 1
          elif [ "$FOUND_COUNT" -gt 1 ]; then
            echo "⚠️  WARNING: Múltiplos binários encontrados ($FOUND_COUNT)"
            find build -type f -name "$BINARY_NAME" 2>/dev/null
          fi
          
          # Copiar binário
          find build -type f -name "$BINARY_NAME" -print -quit | xargs -I {} cp {} "$OUTPUT_PATH"
          
          # Validar cópia
          if [ ! -f "$OUTPUT_PATH" ]; then
            echo "❌ ERROR: Falha ao copiar binário para $OUTPUT_PATH"
            exit 1
          fi
          
          # Tornar executável em Unix
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "$OUTPUT_PATH"
          fi
          
          # Informações finais
          echo "✅ Artefato preparado com sucesso:"
          ls -lh "$OUTPUT_PATH"
          file "$OUTPUT_PATH" || true

      # Verificação de integridade antes do upload
      - name: Verify Artifacts
        shell: bash
        run: |
          echo "Artefatos para upload:"
          ls -lh artifacts/
          
          if [ ! -s artifacts/* ]; then
            echo "❌ ERROR: Nenhum artefato encontrado ou ficheiro vazio"
            exit 1
          fi

      # Upload com retry automático
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/*
          draft: false  # Agora publica (release já existe)
          prerelease: ${{ contains(needs.create-release.outputs.tag, 'alpha') || contains(needs.create-release.outputs.tag, 'beta') || contains(needs.create-release.outputs.tag, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # Continua mesmo se falhar (melhor que parar tudo)

      # Cleanup de cache para evitar espaço excessivo
      - name: Cleanup large files
        if: always()
        shell: bash
        run: |
          # Remove objetos de build desnecessários
          rm -rf build/CMakeFiles build/.cmake
          du -sh build/ artifacts/ 2>/dev/null || true
