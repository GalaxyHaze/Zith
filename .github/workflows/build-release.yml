name: Build and Release (Clang Only)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: 'v0.0.1'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Get Tag Name
        id: get_tag
        run: |
          TAG="${{ github.event.inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-release:
    needs: create-release
    name: Build on ${{ matrix.os }} (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux (AMD64) ──────────────────────────────────────────────────────
          - os: ubuntu-latest
            target_name: zith-linux-amd64
            cache_id: linux-amd64
            install_cmd: sudo apt-get update && sudo apt-get install -y ninja-build clang
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++

          # ── Linux (ARM64) - Clang Nativo ─────────────────────────────────────
          - os: ubuntu-latest
            target_name: zith-linux-arm64
            cache_id: linux-arm64
            install_cmd: sudo apt-get update && sudo apt-get install -y ninja-build clang lld
            # IMPORTANTE: CMAKE_CROSSCOMPILING=ON impede o CMake de rodar o binário
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_CROSSCOMPILING=ON
              -DCMAKE_C_COMPILER_TARGET=aarch64-unknown-linux-gnu
              -DCMAKE_CXX_COMPILER_TARGET=aarch64-unknown-linux-gnu
              -DCMAKE_LINKER=lld

          # ── macOS (AMD64 e ARM64) ───────────────────────────────────────────────
          - os: macos-latest
            target_name: zith-macos-amd64
            cache_id: macos-amd64
            install_cmd: brew install ninja
            cmake_flags: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_CROSSCOMPILING=ON

          - os: macos-latest
            target_name: zith-macos-arm64
            cache_id: macos-arm64
            install_cmd: brew install ninja

          # ── Windows (x64) ──────────────────────────────────────────────────────
          - os: windows-latest
            target_name: zith-windows-amd64.exe
            cache_id: windows-amd64
            install_cmd: choco install llvm ninja -y
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl

          # ── Windows (ARM64) ─────────────────────────────────────────────────────
          - os: windows-latest
            target_name: zith-windows-arm64.exe
            cache_id: windows-arm64
            install_cmd: choco install llvm ninja -y
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DCMAKE_CROSSCOMPILING=ON
              -DCMAKE_C_COMPILER_TARGET=arm64-pc-windows-msvc
              -DCMAKE_CXX_COMPILER_TARGET=arm64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.26.x'

      # --- CACHING ---
      - name: Cache APT
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: ninja-build clang lld
          version: ${{ matrix.cache_id }}

      - name: Cache Homebrew
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-homebrew-${{ hashFiles('.github/workflows/*.yml') }}
          restore-keys: ${{ runner.os }}-homebrew-

      - name: Cache Build
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ matrix.cache_id }}-${{ hashFiles('src/**', 'CMakeLists.txt') }}
          restore-keys: ${{ runner.os }}-build-${{ matrix.cache_id }}-

      # --- BUILD ---
      - name: Install Dependencies
        run: ${{ matrix.install_cmd }}

      - name: Setup MSVC Headers
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake
        # BUILD_TESTING=OFF é crucial para evitar erros em cross-compilação
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            ${{ matrix.cmake_flags }}

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp build/bin/zith.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/bin/zith
            cp build/bin/zith "artifacts/${{ matrix.target_name }}"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 3. Musl (Clang Nativo + Musl - Sem Zig)
  # ─────────────────────────────────────────────────────────────────────────────
  build-musl:
    needs: create-release
    name: Build Linux musl static (Clang) (${{ matrix.target_name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: zith-linux-amd64-musl
            target_triple: x86_64-unknown-linux-musl
          - target_name: zith-linux-arm64-musl
            target_triple: aarch64-unknown-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Install Clang and Musl
        run: |
          sudo apt-get update
          sudo apt-get install -y clang lld cmake ninja-build musl-tools musl-dev

      - name: Configure CMake (Musl)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_TARGET=${{ matrix.target_triple }} \
            -DCMAKE_CXX_COMPILER_TARGET=${{ matrix.target_triple }} \
            -DCMAKE_LINKER=lld \
            -DCMAKE_EXE_LINKER_FLAGS="-static -fuse-ld=lld" \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_CROSSCOMPILING=ON

      - name: Build
        run: cmake --build build --config Release

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts
          chmod +x build/bin/zith
          cp build/bin/zith artifacts/${{ matrix.target_name }}
          ldd artifacts/${{ matrix.target_name }} || echo "Static binary confirmed"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/${{ matrix.target_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────────────────────────────────────
  # 4. WebAssembly (Emscripten)
  # ─────────────────────────────────────────────────────────────────────────────
  build-wasm:
    needs: create-release
    name: Build WebAssembly
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.45
          actions-cache-folder: 'emsdk-cache'

      - name: Configure CMake (WASM)
        # BUILD_TESTING=OFF evita o erro do Catch2 tentando rodar testes
        run: |
          emcmake cmake -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_CROSSCOMPILING=ON

      - name: Build WASM
        run: cmake --build build-wasm --config Release -j$(nproc)

      - name: Prepare Artifact
        run: |
          mkdir -p artifacts wasm-staging
          # Copia arquivos gerados
          if [ -d "build-wasm/bin" ]; then cp build-wasm/bin/* wasm-staging/; fi
          find build-wasm -maxdepth 1 -type f \( -name "*.wasm" -o -name "*.js" -o -name "*.html" \) -exec cp {} wasm-staging/ \;
          
          # Empacota
          cd wasm-staging && zip -r ../artifacts/zith-wasm.zip .

      - name: Upload WASM
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-wasm.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
